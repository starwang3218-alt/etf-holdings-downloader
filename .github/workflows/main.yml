name: 🚀 WisdomTree 云端突围测试

# 允许手动随时点击运行
on:
  workflow_dispatch:

jobs:
  scrape-and-test:
    runs-on: ubuntu-latest # 使用 Ubuntu 环境，启动速度最快
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安装核心依赖
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests playwright lxml openpyxl xlrd html5lib

      - name: 🌐 安装无头浏览器环境 (Playwright)
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: ⚔️ 发起突围测试 (执行爬虫脚本)
        run: |
          # 运行脚本，输出到 result 目录
          python download_holdings_wisdomtree_v13_fixed.py -i wisdom_links.txt -o result/holdings

      - name: 📤 上传战利品与侦察情报 (Artifacts)
        # 无论上一步是否报错，强制打包产物，我们要看 _debug 目录里的截图
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: WisdomTree_Results_and_Debug
          # 包含清洗好的 CSV 和 _debug 文件夹里的错误截图
          path: result/ 
          retention-days: 3
